name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: PHP Lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [ '7.4', '8.0', '8.1', '8.2', '8.3' ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Lint all PHP files
        run: |
          find . -path ./node_modules -prune -o -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l

  phpcs:
    name: PHPCS (WordPress)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          coverage: none
          tools: composer

      - name: Install PHP_CodeSniffer + WordPress standards
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-interaction --no-progress \
            squizlabs/php_codesniffer:^3.9 \
            wp-coding-standards/wpcs:^3.1 \
            phpcompatibility/phpcompatibility-wp:^2.1

      - name: Run PHPCS
        run: "$(composer global config home)/vendor/bin/phpcs --standard=phpcs.xml.dist ."
